<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Client Information</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Client Information</h1>

</header>

<div class="container">

<div class="card">

<form>

<label>

Client Name

<input
type="text"
placeholder="Enter your name"
required>

</label>

<label>

Phone Number

<input
type="tel"
placeholder="097xxxxxxx"
required>

</label>

<label>

Email (Optional)

<input
type="email"
placeholder="example@gmail.com">

</label>

<button type="submit">

Submit

</button>

</form>

</div>

</div>

</body>

</html>
